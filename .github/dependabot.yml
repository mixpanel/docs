version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  commit-message:
    prefix: chore(deps-gha)
  cooldown:
    default-days: 30
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
  commit-message:
    prefix: chore(deps-npm)
  cooldown:
    default-days: 30
