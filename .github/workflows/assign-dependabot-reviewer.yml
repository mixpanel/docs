name: Assign Dependabot reviewer
on:
  pull_request:
    types: [opened]

jobs:
  assign-reviewer:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Request tofu team review
        run: gh pr edit "$PR_NUMBER" --add-reviewer "mixpanel/tofu"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}