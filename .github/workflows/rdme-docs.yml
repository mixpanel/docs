name: ReadMe GitHub Action 🦉

on:
  push:
    branches:
      # This workflow will run every time you push code to the following branch: `main`
      # Check out GitHub's docs for more info on configuring this:
      # https://docs.github.com/actions/using-workflows/events-that-trigger-workflows
      - main
    paths:
      - 'reference/**'

jobs:
  rdme-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo 📚
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run `docs` command 🚀
        uses: readmeio/rdme@3c41af599df44e516c90ba4107a81c05d4945822  # rdme version 10.6.2
        with:
          rdme: reference upload ./reference --key=${{ secrets.README_API_KEY }} --branch=3.27
