components:
  securitySchemes:
    ServiceAccount:
      type: http
      scheme: basic
      description: Service Account
    ProjectSecret:
      type: http
      scheme: basic
      description: Project Secret
    OAuthToken:
      type: http
      scheme: bearer
      description: OAuth Token
  schemas:
    SchemaEntityType:
      type: string
      enum:
        - event
        - profile
    Schema:
      type: object
      description: The schema for the entity
      properties:
        description:
          type: string
          description: The entity description
        properties:
          type: object
          description: The list of properties that should be included on an instance of this entity
          additionalProperties:
            type: object
            description: The name and definition for a property. E.g. "item_id"
            required:
              - type
            properties:
              type:
                enum:
                  - array
                  - boolean
                  - integer
                  - "null"
                  - number
                  - object
                  - string
              description:
                type: string
                description: The property description
              metadata:
                type: object
                properties:
                  com.mixpanel:
                    type: object
                    description: Metadata that is specific to Mixpanel
                    properties:
                      displayName:
                        type: string
                        description: If set, this name will be used in the Mixpanel UI instead of the entity name
                      hidden:
                        type: boolean
                        description: If true, this property will be hidden in the Mixpanel UI
                        default: false
                      dropped:
                        type: boolean
                        description: "[Events only] If true, the property will be dropped at ingestion time."
                        default: false
                    additionalProperties: false
            additionalProperties: false
        metadata:
          type: object
          properties:
            com.mixpanel:
              type: object
              description: Metadata about this entity that is specific to Mixpanel
              properties:
                $source:
                  type: string
                  description: The source of this schema. Used by partners to identify themselves
                displayName:
                  type: string
                  description: If set, this name will be used in the Mixpanel UI instead of the entity name
                tags:
                  type: array
                  description: A list of tags to associate to this entity that can be used in the Mixpanel UI for filtering
                  items:
                    type: string
                hidden:
                  type: boolean
                  description: If true, this entity will be hidden in the Mixpanel UI
                  default: false
                dropped:
                  type: boolean
                  description: "[Events only] If true, the event will be dropped at ingestion time."
                  default: false
                contacts:
                  type: array
                  description: A list of emails belonging to users responsible for this entity.
                  items:
                    type: string
                    additionalProperties: false
                teamContacts:
                  type: array
                  description: A list of team names responsible for this entity.
                  items:
                    type: string
              additionalProperties: false
    SchemaEntry:
      type: object
      properties:
        entityType:
          $ref: "#/components/schemas/SchemaEntityType"
        name:
          type: string
          description: "The entity name (eg: Added To Cart)"
        schemaJson:
          $ref: "#/components/schemas/Schema"
      required:
        - name
        - entityType
        - schemaJson
      additionalProperties: false
    ListSchemasResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SchemaEntry"
        status:
          type: string
          enum:
            - ok
    BatchUploadSchemasResponse:
      type: object
      properties:
        results:
          type: object
          properties:
            added:
              type: integer
              description: The number of entries that were inserted
            deleted:
              type: integer
              description: "The number of entries that were deleted (on applicable if `truncate: true`)"
        status:
          type: string
          enum:
            - ok
    DeleteSchemasResponse:
      type: object
      properties:
        results:
          type: object
          properties:
            delete_count:
              type: integer
        status:
          type: string
          enum:
            - ok
    UploadSchemasResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
  parameters:
    schemaEntityType:
      in: path
      name: entityType
      schema:
        $ref: "#/components/schemas/SchemaEntityType"
      required: true
      description: "The entity type (eg: event)"
    schemaEntityName:
      in: path
      name: name
      schema:
        type: string
      required: true
      description: "The entity name (eg: Added To Cart)"
    schemaEntityNameQuery:
      in: query
      name: entity_name
      schema:
        type: string
      required: false
      description: "The entity name (eg: Added To Cart)"
x-explorer-enabled: true
x-proxy-enabled: true
x-samples-enabled: true
x-samples-languages:
  - curl
  - node
  - ruby
  - javascript
  - python
