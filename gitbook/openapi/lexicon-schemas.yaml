openapi: 3.0.2
info:
  title: Lexicon Schemas API
  description: Use schemas to sync your data dictionary with Mixpanel. Schemas can be used to populate Lexicon and provide additional context for your data.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    url: https://mixpanel.com/get-support
  version: 1.0.0
servers:
  - url: https://mixpanel.com/api/app
    description: The default (US) servers used for most projects
  - url: https://eu.mixpanel.com/api/app
    description: EU servers if you are enrolled in EU Data Residency
  - url: https://in.mixpanel.com/api/app
    description: India servers if you are enrolled in India Data Residency
security:
  - ServiceAccount: []
tags:
  - name: Create Schemas
    description: Operations to add schemas to a project
  - name: Delete Schemas
    description: Remove a schema from a project
  - name: Retrieve Schemas
    description: Get additional information about schemas
  - name: Update Schemas
    description: Make changes to an existing Schema
paths:
  /projects/{projectId}/schemas:
    get:
      tags:
        - Retrieve Schemas
      operationId: list-all-schemas-for-project
      summary: List Schemas
      parameters:
        - name: projectId
          in: path
          description: "Your project id (eg: 12345)"
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchemasResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
      description: List all schemas in a project
    post:
      tags:
        - Create Schemas
      operationId: upload-schemas-for-project
      summary: Create/Replace Multiple
      parameters:
        - name: projectId
          in: path
          description: "Your project id (eg: 12345)"
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  type: array
                  description: The list of schema entries to upload
                  items:
                    $ref: "#/components/schemas/SchemaEntry"
                truncate:
                  type: boolean
                  description: If true, delete your entire data dictionary before inserting these entries. This is primarily useful if you want to upload a single file that represents your entire data dictionary.
                  default: false
              required:
                - entries
              additionalProperties: false
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUploadSchemasResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
      description: |-
        Upload schemas in bulk to the specified project. If a schema already exists for a specified entity, it will be replaced by the one you upload.

        {% hint style="warning" %}
        Metadata merging behavior

          If the new schema is missing `metadata` properties that are currently set in the existing schema for that entity, those properties will be merged into the new schema. For example, if your current schema has `{"metadata": {"com.mixpanel": {"hidden": true}}}` and you upload a new schema without "hidden", we will merge `"hidden": true` to your uploaded schema's metadata. If you want to remove that property, set the value to `null`.
        {% endhint %}

        {% hint style="info" %}
        Adding a schema for User Profiles

          To add a schema for your [User Profiles](https://help.mixpanel.com/hc/en-us/articles/115004501966-User-Profiles), specify the `entityType` as `profile` and the `name` as `$user`.
        {% endhint %}

        ### Example POST Body

        ```json
        {
          "entries": [
            {
              "entityType": "event",
              "name": "Added To Cart",
              "schemaJson": {
                "$schema": "http://json-schema.org/draft-07/schema",
                "description": "Tracked when a user adds an item to their cart.",
                "required": [
                  "item_name",
                  "item_id",
                  "item_price"
                ],
                "additionalProperties": true,
                "metadata": {
                  "com.mixpanel": {
                    "tags": [
                      "Shopping",
                      "KPIs"
                    ],
                    "displayName": "Item Purchased",
                    "hidden": false,
                    "dropped": false,
                    "contacts": [
                      "first.last@mixpanel.com"
                    ],
                    "teamContacts": [
                      "Analytics Team"
                    ]
                  }
                },
                "properties": {
                  "item_name": {
                    "type": "string",
                    "description": "The name of the item",
                    "examples": [
                      "Blue Widget"
                    ],
                    "metadata": {
                      "com.mixpanel": {
                        "displayName": "Item Name"
                      }
                    }
                  },
                  "item_id": {
                    "type": "integer",
                    "description": "The internal id of the item",
                    "examples": [
                      12345
                    ],
                    "metadata": {
                      "com.mixpanel": {
                        "displayName": "Item ID"
                      }
                    }
                  },
                  "item_price": {
                    "type": "number",
                    "description": "The current price of the item",
                    "examples": [
                      25.35
                    ],
                    "metadata": {
                      "com.mixpanel": {
                        "displayName": "Price"
                      }
                    }
                  },
                  "promo_id": {
                    "type": "integer",
                    "description": "The id of any promo in progress for this item",
                    "examples": [
                      82523,
                      18382
                    ],
                    "metadata": {
                      "com.mixpanel": {
                        "displayName": "Promo ID"
                      }
                    }
                  },
                  "date_added_to_catalog": {
                    "type": "string",
                    "format": "date-time",
                    "description": "The date this item was added to the store catalog",
                    "examples": [
                      "2015-03-05T15:25:23"
                    ],
                    "metadata": {
                      "com.mixpanel": {
                        "displayName": "Date Added"
                      }
                    }
                  }
                }
              }
            }
          ],
          "truncate": false
        }
        ```
    delete:
      tags:
        - Delete Schemas
      operationId: delete-all-schemas-in-project
      summary: Delete all Schemas
      parameters:
        - name: projectId
          in: path
          description: "Your project id (eg: 12345)"
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSchemasResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
      description: Delete all schemas in a project
  /projects/{projectId}/schemas/{entityType}:
    get:
      tags:
        - Retrieve Schemas
      operationId: list-schemas-for-entity
      summary: List for Entity
      parameters:
        - name: projectId
          in: path
          description: "Your project id (eg: 12345)"
          required: true
          schema:
            type: integer
        - name: entityType
          in: path
          description: "The entity type (eg: event)"
          required: true
          schema:
            $ref: "#/components/schemas/SchemaEntityType"
        - name: entity_name
          in: query
          description: "The entity name (eg: Added To Cart)"
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchemasResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
      description: Get all schemas for a specific entity type
    delete:
      tags:
        - Delete Schemas
      operationId: delete-schemas-for-entity
      summary: Delete for Entity
      parameters:
        - name: projectId
          in: path
          description: "Your project id (eg: 12345)"
          required: true
          schema:
            type: integer
        - name: entityType
          in: path
          description: "The entity type (eg: event)"
          required: true
          schema:
            $ref: "#/components/schemas/SchemaEntityType"
        - name: entity_name
          in: query
          description: "The entity name (eg: Added To Cart)"
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSchemasResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
      description: Delete all schemas of a specific entity type
  /projects/{projectId}/schemas/{entityType}/{name}:
    get:
      tags:
        - Retrieve Schemas
      operationId: list-schemas-by-entity-and-name
      summary: List for Entity and Name
      parameters:
        - name: projectId
          in: path
          description: "Your project id (eg: 12345)"
          required: true
          schema:
            type: integer
        - name: entityType
          in: path
          description: "The entity type (eg: event)"
          required: true
          schema:
            $ref: "#/components/schemas/SchemaEntityType"
        - name: name
          in: path
          description: "The entity name (eg: Added To Cart)"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schema"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
      description: Get the schema for a specific entity type and entity name
    delete:
      tags:
        - Delete Schemas
      operationId: delete-schema-by-entity-and-name
      summary: Delete for Entity and Name
      parameters:
        - name: projectId
          in: path
          description: "Your project id (eg: 12345)"
          required: true
          schema:
            type: integer
        - name: entityType
          in: path
          description: "The entity type (eg: event)"
          required: true
          schema:
            $ref: "#/components/schemas/SchemaEntityType"
        - name: name
          in: path
          description: "The entity name (eg: Added To Cart)"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSchemasResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
      description: Delete schema for an entity type and entity name
    post:
      tags:
        - Create Schemas
      operationId: upload-schema-by-entity-and-name
      summary: Create/Replace One
      parameters:
        - name: projectId
          in: path
          description: "Your project id (eg: 12345)"
          required: true
          schema:
            type: integer
        - name: entityType
          in: path
          description: "The entity type (eg: event)"
          required: true
          schema:
            $ref: "#/components/schemas/SchemaEntityType"
        - name: name
          in: path
          description: "The entity name (eg: Added To Cart)"
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Schema"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSchemasResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/ErrorResponse"
      description: |-
        Upload a schema for a single entity. If a schema already exists for a specified entity, it will be replaced by the one you upload.

        {% hint style="warning" %}
        Metadata merging behavior

          If the new schema is missing `metadata` properties that are currently set in the existing schema for that entity, those properties will be merged into the new schema. For example, if your current schema has `{"metadata": {"com.mixpanel": {"hidden": true}}}` and you upload a new schema without "hidden", we will merge `"hidden": true` to your uploaded schema's metadata. If you want to remove that property, set the value to `null`.
        {% endhint %}

        {% hint style="info" %}
        Adding a schema for User Profiles

          To add a schema for your [User Profiles](https://help.mixpanel.com/hc/en-us/articles/115004501966-User-Profiles), specify the `entityType` as `profile` and the `name` as `$user`.
        {% endhint %}

