  /engage#profile-unset:
    post:
      operationId: profile-delete-property
      tags:
      - User Profiles
      summary: Delete Property
      description: Takes a JSON list of string property names, and permanently removes the properties and their values from
        a profile.
      security:
      - {}
      parameters:
      - in: query
        name: ip
        required: false
