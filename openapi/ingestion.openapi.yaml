      operationId: profile-batch-update
      tags:
      - User Profiles
      summary: Update Multiple Profiles
      description: 'Send a batch of profile updates. Instead of sending a single JSON object as the data query parameter,
        send a JSON list of objects as the data parameter of an application/json POST or GET request body.


        Refer to the respective user profile update commands (\$set, \$set_once, \$add, \$union, \$append, \$remove, \$unset, and
        \$delete) on syntax for their parameters.'
      security:
      - {}
      parameters:
      - in: query
        name: ip
        required: false
        schema:
          type: integer
          minimum: 0
          maximum: 1
          default: 0
          description: If present and equal to 0, Mixpanel will not perform geolocation parsing using the IP address of the
            request. We recommend setting the ip to "0" when making requests from the server-side to prevent the unintentional
            effect of overwriting your profile's geolocation with your server location. Defaults to 1 which would use the
            IP address of the request to update profile geolocation.
      - in: query
