        '200':
          $ref: '#/components/responses/Received'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /engage#profile-union:
    post:
      operationId: user-profile-union
      tags:
      - User Profiles
      summary: Union To List Property
      description: Adds the specified values to a list property on a user profile and ensures that those values only appear
        once. The profile is created if it does not exist.
      security:
      - {}
