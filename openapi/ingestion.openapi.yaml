openapi: 3.0.2
x-readme-deploy-id: ingestion
info:
  title: Ingestion API
  description: APIs allowing for event-based tracking and user profile handling.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 1.0.0
  contact:
    url: https://mixpanel.com/get-support
servers:
- url: https://{region}.mixpanel.com
  description: Mixpanel's data collection server.
  variables:
    region:
      default: api
      enum:
      - api
      - api-eu
      - api-in
      description: "The server location to be used:\n  * `api` - The default (US) servers used for most projects\n  * `api-eu`\
        \ - EU servers if you are enrolled in EU Data Residency\n  * `api-in` - India servers if you are enrolled in India\
        \ Data Residency\n"
tags:
- name: Events
  description: Track events.
- name: Group Profiles
  description: Manage groups and their properties
- name: Identities
  description: Register or merge users with a new identity.
- name: Lookup Tables
  description: Enrich existing event and profile properties
- name: User Profiles
  description: Manage profiles and their properties
paths:
  /import:
    post:
      tags:
      - Events
      operationId: import-events
      security:
      - ServiceAccount: []
      - ProjectSecret: []
      - OAuthToken: []
      summary: Import Events
      description: ''
      parameters:
      - in: query
        name: strict
        required: true
        schema:
          type: string
          default: '1'
          enum:
          - '0'
          - '1'
        description: When set to 1 (recommended), Mixpanel will validate the batch and return errors per event that failed.
      - in: query
        name: project_id
        required: true
        schema:
          default: <YOUR_PROJECT_ID>
          type: string
        description: The Mixpanel project_id, used to authenticate service account credentials.
      - in: header
        name: Content-Type
        schema:
          type: string
          default: application/json
          enum:
          - application/json
          - application/x-ndjson
      - in: header
        name: Content-Encoding
        schema:
          type: string
          enum:
          - gzip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                type: object
                required:
                - event
                - properties
                properties:
                  event:
                    type: string
                    title: event
                    description: The name of the event.
                  properties:
                    type: object
                    title: properties
                    description: A JSON object containing properties of the event.
                    required:
                    - time
                    - $insert_id
                    - distinct_id
                    properties:
                      time:
                        type: integer
                        title: time
                        description: The time at which the event occurred, in seconds or milliseconds since UTC epoch. If
                          the time value is set in the future, it will be overwritten with the current present time at ingestion.
                      distinct_id:
                        type: string
                        title: distinct_id
                        description: The unique identifier of the user who performed the event.
                      $insert_id:
                        type: string
                        title: $insert_id
                        description: A unique identifier for the event, used for deduplication. Events with identical values
                          for (event, time, distinct_id, $insert_id) are considered duplicates; only the latest ingested one
                          will be considered in queries.
                    additionalProperties: true
                additionalProperties: false
      responses:
        '200':
          $ref: '#/components/responses/StrictReceived'
        '400':
          $ref: '#/components/responses/StrictInvalid'
        '401':
          $ref: '#/components/responses/StrictUnauthorized'
        '413':
          $ref: '#/components/responses/StrictTooLarge'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /track:
    post:
      operationId: track-event
      tags:
      - Events
      summary: Track Events
      description: ''
      security:
      - {}
      parameters:
      - in: query
        name: ip
        required: false
        schema:
          type: integer
          minimum: 0
          maximum: 1
        description: If present and equal to 1, Mixpanel will use the ip address of the incoming request and compute a distinct_id
          using a hash function if no distinct_id is provided. This is different from providing a `properties.ip` value in
          the Event Object.
      - in: query
        name: verbose
        required: false
        schema:
          type: integer
          minimum: 0
          maximum: 1
        description: 'If present and equal to 1, Mixpanel will respond with a JSON Object describing the success or failure
          of the tracking call. The returned object will have two keys: `status`, with the value 1 on success and 0 on failure,
          and `error`, with a string-valued error message if the request wasn''t successful. This is useful for debugging
          during implementation.'
      - in: query
        name: img
        required: false
        schema:
          type: integer
          minimum: 0
          maximum: 1
        description: If present and equal to 1, Mixpanel will serve a 1x1 transparent pixel image as a response to the request.
          This is useful for adding [Pixel Tracking](https://en.wikipedia.org/wiki/Web_beacon) in places that javascript is
          not supported.
      - in: query
        name: callback
        required: false
        schema:
          type: string
        description: 'If present, Mixpanel will return a `content-type: text/javascript` with a body that calls a function
          by value provided. This is useful for creating local callbacks to a successful track call in JavaScript.'
      requestBody:
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                type: object
                required:
                - event
                - properties
                properties:
                  event:
                    type: string
                    title: event
                    description: The name of the event.
                  properties:
                    type: object
                    title: properties
                    description: A JSON object containing properties of the event.
                    properties:
                      token:
                        type: string
                        title: token
                        description: Project token.
                      time:
                        type: integer
                        title: time
                        description: The time at which the event occurred, in seconds or milliseconds since UTC epoch. If
                          the time value is set in the future, it will be overwritten with the current present time at ingestion.
                      distinct_id:
                        type: string
                        title: distinct_id
                        description: The unique identifier of the user who performed the event.
                      $insert_id:
                        type: string
                        title: $insert_id
                        description: A unique identifier for the event, used for deduplication. Events with identical values
                          for (event, time, distinct_id, $insert_id) are considered duplicates; only the latest ingested one
                          will be considered in queries.
                    additionalProperties: true
                additionalProperties: false
      responses:
        '200':
          $ref: '#/components/responses/Received'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /engage#profile-set:
    post:
      operationId: profile-set
      tags:
      - User Profiles
      summary: Set Property
      description: Takes a JSON object containing names and values of profile properties. If the profile does not exist, it
        creates it with these properties. If it does exist, it sets the properties to these values, overwriting existing values.
      security:
      - {}
      parameters:
      - in: query
        name: ip
        required: false
        schema:
          type: integer
          minimum: 0
          maximum: 1
          default: 0
          description: If present and equal to 0, Mixpanel will not perform geolocation parsing using the IP address of the
            request. We recommend setting the ip to "0" when making requests from the server-side to prevent the unintentional
            effect of overwriting your profile's geolocation with your server location. Defaults to 1 which would use the
            IP address of the request to update profile geolocation.
      - in: query
        name: strict
        required: false
        schema:
          type: integer
          minimum: 0
          maximum: 1
          description: If present and equal to 1, Mixpanel will validate the provided records and return a JSON object with
            per-record error messages for records that fail validation.
      - in: query
        name: verbose
        required: false
        schema:
          type: integer
          minimum: 0
          maximum: 1
        description: 'If present and equal to 1, Mixpanel will respond with a JSON Object describing the success or failure
          of the tracking call. The returned object will have two keys: `status`, with the value 1 on success and 0 on failure,
          and `error`, with a string-valued error message if the request wasn''t successful. This is useful for debugging
          during implementation.'
      - in: query
        name: callback
        required: false
        schema:
          type: string
        description: 'If present, Mixpanel will return a `content-type: text/javascript` with a body that calls a function
          by value provided. This is useful for creating local callbacks to a successful track call in JavaScript.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                type: object
                description: A JSON update object, with a $token, $distinct_id, and $set operation object.
                required:
                - $token
                - $distinct_id
                - $set
                properties:
                  $token:
                    type: string
                    default: YOUR_PROJECT_TOKEN
                  $distinct_id:
                    type: string
                    default: '13793'
                  $set:
                    type: object
      responses:
        '200':
          $ref: '#/components/responses/Received'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
