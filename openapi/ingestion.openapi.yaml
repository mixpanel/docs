  /engage#profile-numerical-add:
    post:
      operationId: profile-numerical-add
      tags:
      - User Profiles
      summary: Increment Numerical Property
      description: Takes a JSON object containing keys and numerical values. \$add will increment the value of a user profile
        property. When processed, the property values are added to the existing values of the properties on the profile. If
        the property is not present on the profile, the value will be added to 0. It is possible to decrement by calling "\$add"
        with negative values. This is useful for maintaining the values of properties like "Number of Logins" or "Files Uploaded".
      security:
      - {}
      parameters:
      - in: query
        name: ip
        required: false
        schema:
          type: integer
          minimum: 0
          maximum: 1
          default: 0
          description: If present and equal to 0, Mixpanel will not perform geolocation parsing using the IP address of the
            request. We recommend setting the ip to "0" when making requests from the server-side to prevent the unintentional
