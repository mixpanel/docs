openapi: 3.1.0
x-readme-deploy-id: feature-flags-api
info:
  title: Feature Flags API
  description: >-
    Use the Feature Flags API to evaluate feature flags for users and retrieve feature flag definitions.
  contact:
    url: 'https://mixpanel.com/get-support'
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 1.0.0
servers:
  - $ref: ./common/feature-flags-api.yaml#/server
tags:
  - name: Get Variant Assignments
    description: Evaluate feature flags for a specific user
  - name: Get Flag Definitions
    description: Retrieve feature flag definitions
  - name: Flag Management
    description: Create, update, delete, and manage feature flags
paths:
  /flags:
    get:
      operationId: get-variant-assignments
      security:
        - ProjectSecret: []
      parameters:
        - $ref: '#/components/parameters/ProjectToken'
        - name: context
          in: query
          description: 'URL-encoded JSON object containing evaluation context with distinct_id (required) and optional device_id and custom_properties object'
          required: true
          schema:
            type: string
          example: '%7B++%22distinct_id%22%3A%22user123%22%2C++%22device_id%22%3A%22device456%22%2C++%22custom_properties%22%3A+%7B++++%22some_key%22%3A+%22some_value%22%2C++++%22another_key%22%3A+32++%7D%7D%22'
      tags:
        - Get Variant Assignments
      summary: Evaluate Feature Flags (GET)
      description: Evaluate all enabled feature flags for a user with the provided context. Returns selected variants for flags the user is eligible for.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateFlagsResponse'
        '400':
          $ref: ./common/responses.yaml#/400BadRequest
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden
  /flags/definitions:
    get:
      operationId: get-flag-definitions
      security:
        - ProjectSecret: []
      parameters:
        - $ref: '#/components/parameters/ProjectToken'
      tags:
        - Get Flag Definitions
      summary: Get Feature Flag Definitions
      description: Retrieve all enabled feature flag definitions for the authenticated project. Returns complete flag metadata including rulesets, variants, and rollout configurations.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlagDefinitionsResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  # --- Project-scoped management paths ---

  /projects/{project_id}/feature-flags:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: list-feature-flags
      tags:
        - Flag Management
      summary: List Feature Flags
      security:
        - ServiceAccount: []
      parameters:
        - name: include_archived
          in: query
          schema:
            type: string
            enum:
              - 'true'
              - 'false'
          description: Whether to include archived (soft-deleted) feature flags. Defaults to false.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFeatureFlagResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden
    post:
      operationId: create-feature-flag
      tags:
        - Flag Management
      summary: Create Feature Flag
      security:
        - ServiceAccount: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureFlagRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleFeatureFlagResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  /projects/{project_id}/feature-flags/limits:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: get-feature-flag-limits
      tags:
        - Flag Management
      summary: Get Feature Flag Limits
      security:
        - ServiceAccount: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlagLimitsResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  /projects/{project_id}/feature-flags/{flag_id}:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/FlagId'
    get:
      operationId: get-feature-flag
      tags:
        - Flag Management
      summary: Get Feature Flag
      security:
        - ServiceAccount: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleFeatureFlagResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden
    delete:
      operationId: delete-feature-flag
      tags:
        - Flag Management
      summary: Delete Feature Flag
      security:
        - ServiceAccount: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteFeatureFlagResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden
    put:
      operationId: update-feature-flag
      tags:
        - Flag Management
      summary: Update Feature Flag
      security:
        - ServiceAccount: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureFlagRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleFeatureFlagResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  /projects/{project_id}/feature-flags/{flag_id}/archive:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/FlagId'
    post:
      operationId: archive-feature-flag
      tags:
        - Flag Management
      summary: Archive Feature Flag
      security:
        - ServiceAccount: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveFeatureFlagRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleFeatureFlagResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden
    delete:
      operationId: unarchive-feature-flag
      tags:
        - Flag Management
      summary: Unarchive Feature Flag
      security:
        - ServiceAccount: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleFeatureFlagResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  /projects/{project_id}/feature-flags/{flag_id}/duplicate:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/FlagId'
    post:
      operationId: duplicate-feature-flag
      tags:
        - Flag Management
      summary: Duplicate Feature Flag
      security:
        - ServiceAccount: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateFeatureFlagRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleFeatureFlagResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  /projects/{project_id}/feature-flags/{flag_id}/history:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/FlagId'
    get:
      operationId: get-feature-flag-history
      tags:
        - Flag Management
      summary: Get Feature Flag History
      security:
        - ServiceAccount: []
      parameters:
        - name: page
          in: query
          schema:
            type: string
          description: ISO 8601 datetime cursor for pagination. Empty or omitted for the first page.
        - name: page_size
          in: query
          schema:
            type: integer
            default: 10
          description: Number of history entries per page. Defaults to 10.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlagHistoryResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  /projects/{project_id}/feature-flags/{resource_id}/views:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: get-feature-flag-views
      tags:
        - Flag Management
      summary: Get Feature Flag Views
      security:
        - ServiceAccount: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden
    post:
      operationId: record-feature-flag-view
      tags:
        - Flag Management
      summary: Record Feature Flag View
      security:
        - ServiceAccount: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureFlagPresenceRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  /projects/{project_id}/feature-flags/{flag_id}/test-users:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/FlagId'
    put:
      operationId: update-feature-flag-test-users
      tags:
        - Flag Management
      summary: Update Feature Flag Test Users
      security:
        - ServiceAccount: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManagementTestUsers'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleFeatureFlagResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  /projects/{project_id}/feature-flags/last-cohort-sync-time:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      operationId: get-last-cohort-sync-time
      tags:
        - Flag Management
      summary: Get Last Cohort Sync Time
      security:
        - ServiceAccount: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CohortSyncTimeRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohortSyncTime'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden

  /projects/{project_id}/feature-flags/users:
    servers:
      - $ref: ./common/app-api.yaml#/server
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      operationId: get-feature-flag-users
      tags:
        - Flag Management
      summary: Get Feature Flag Users
      security:
        - ServiceAccount: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureFlagUsersRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlagUsersResponse'
        '401':
          $ref: ./common/responses.yaml#/401Unauthorized
        '403':
          $ref: ./common/responses.yaml#/403Forbidden
components:
  securitySchemes:
    $ref: ./common/securitySchemes.yaml
  parameters:
    ProjectToken:
      name: token
      in: query
      schema:
        type: string
      description: 'Your project token'
      required: true
    ProjectId:
      name: project_id
      in: path
      schema:
        type: integer
      required: true
    FlagId:
      name: flag_id
      in: path
      schema:
        type: string
      required: true
    ResourceId:
      name: resource_id
      in: path
      schema:
        type: string
      required: true
  schemas:
    # --- Existing evaluation schemas ---
    EvaluateFlagsRequest:
      title: EvaluateFlagsRequest
      description: Request body for feature flag evaluation
      type: object
      required:
        - context
      properties:
        context:
          $ref: '#/components/schemas/EvaluationContext'
    EvaluationContext:
      title: EvaluationContext
      description: Context object containing user information and properties for flag evaluation
      type: object
      required:
        - distinct_id
      properties:
        distinct_id:
          type: string
          description: The distinct ID of the user to evaluate flags for
          example: 'user123'
        device_id:
          type: string
          description: Optional device ID. If not provided, distinct_id will be used
          example: 'device456'
        custom_properties:
          type: object
          description: Optional runtime parameters for evaluation by runtime_evaluation_rule in rollout definitions
          additionalProperties: true
          example:
            country: 'US'
            platform: 'web'
    EvaluateFlagsResponse:
      title: EvaluateFlagsResponse
      description: Response containing evaluated feature flags for the user
      type: object
      required:
        - flags
      properties:
        flags:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SelectedVariant'
          description: Map of flag keys to their selected variants
          example:
            new_checkout_flow:
              variant_key: 'treatment'
              variant_value: true
              experiment_id: 'exp_123'
              is_experiment_active: true
    SelectedVariant:
      title: SelectedVariant
      description: The selected variant for a feature flag
      type: object
      required:
        - variant_key
        - variant_value
      properties:
        variant_key:
          type: string
          description: The key of the selected variant
          example: 'treatment'
        variant_value:
          description: The value of the selected variant (can be any type)
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: object
          example: true
        experiment_id:
          type: string
          description: The ID of the associated experiment, if any
          example: 'exp_123'
        is_experiment_active:
          type: boolean
          description: Whether the associated experiment is currently active
          example: true
        is_qa_tester:
          type: boolean
          description: Whether the user was identified as a QA tester
          example: false
    FlagDefinitionsResponse:
      title: FlagDefinitionsResponse
      description: Response containing all enabled feature flag definitions
      type: object
      required:
        - flags
      properties:
        flags:
          type: array
          items:
            $ref: '#/components/schemas/ExperimentationFlagMetadata'
          description: Array of enabled feature flag definitions
    ExperimentationFlagMetadata:
      title: ExperimentationFlagMetadata
      description: Complete metadata for a feature flag
      type: object
      required:
        - id
        - name
        - key
        - status
        - project_id
        - workspace_id
        - ruleset
        - context
      properties:
        id:
          type: string
          description: Unique identifier for the flag
          example: 'flag_abc123'
        name:
          type: string
          description: Human-readable name of the flag
          example: 'New Checkout Flow'
        key:
          type: string
          description: Unique key used to reference the flag
          example: 'new_checkout_flow'
        status:
          type: string
          enum: ['enabled', 'disabled', 'archived']
          description: Current status of the flag
          example: 'enabled'
        project_id:
          type: integer
          format: int32
          description: ID of the project this flag belongs to
          example: 12345
        workspace_id:
          type: integer
          format: int64
          description: ID of the workspace (dataview) this flag belongs to
          example: 67890
        ruleset:
          $ref: '#/components/schemas/RuleSet'
        context:
          type: string
          description: The context variable used for flag evaluation (e.g., distinct_id, device_id)
          example: 'device_id'
        experiment_id:
          type: string
          description: ID of the associated experiment, if any
          example: 'exp_123'
        is_experiment_active:
          type: boolean
          description: Whether the associated experiment is currently active
          example: true
    RuleSet:
      title: RuleSet
      description: Complete ruleset for a feature flag including variants and rollout configuration
      type: object
      required:
        - variants
        - rollout
      properties:
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Variant'
          description: Array of variant definitions for this flag
        rollout:
          type: array
          items:
            $ref: '#/components/schemas/Rollout'
          description: Array of rollout rules defining how the flag is distributed
        test:
          $ref: '#/components/schemas/TestUsers'
    Variant:
      title: Variant
      description: A variant definition for a feature flag
      type: object
      required:
        - key
        - value
        - is_control
        - split
      properties:
        key:
          type: string
          description: Unique key for this variant
          example: 'treatment'
        value:
          description: The value for this variant (can be any type)
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: object
          example: true
        is_control:
          type: boolean
          description: Whether this is the control variant
          example: false
        is_sticky:
          type: boolean
          description: Whether users should stick to this variant once assigned
          example: true
        split:
          type: number
          format: double
          description: The proportion of users that should receive this variant (0.0 to 1.0)
          example: 0.5
    Rollout:
      title: Rollout
      description: A rollout rule defining how a flag is distributed to a cohort
      type: object
      required:
        - rollout_percentage
      properties:
        rollout_percentage:
          type: number
          format: double
          description: The percentage of the cohort that should receive this flag (0.0 to 1.0)
          example: 0.8
        cohort_hash:
          type: string
          description: Hash of the cohort definition for lookup
          example: 'cohort_abc123'
        runtime_evaluation_rule:
          type: object
          additionalProperties: true
          description: JsonLogic rule that's evaluated at request time based on runtime parameters in the request
          example:
            platform: 'web'
        runtime_evaluation_definition:
          deprecated: true
          type: object
          additionalProperties: true
          description: Key-value pairs that are evaluated at request time for cohort matching, replaced by the more powerful runtime_evaluation_rule
          example:
            platform: 'web'
        variant_splits:
          type: object
          additionalProperties:
            type: number
            format: double
          description: Dictionary mapping variant keys to their allocation splits within this rollout
          example:
            control: 0.5
            treatment: 0.5
        variant_override:
          deprecated: true
          $ref: '#/components/schemas/VariantOverride'
    VariantOverride:
      deprecated: true
      title: VariantOverride
      description: Override to force a specific variant for a rollout rule (replaced by variant_splits)
      type: object
      properties:
        key:
          type: string
          description: The variant key to force
          example: 'treatment'
    TestUsers:
      title: TestUsers
      description: Mapping of test users to their assigned variants
      type: object
      properties:
        users:
          type: object
          additionalProperties:
            type: string
          description: Map of distinct_id to variant_key for QA testing
          example:
            qa_user_1: 'treatment'
            qa_user_2: 'control'

    # --- Management enums ---
    FeatureFlagStatus:
      enum:
        - enabled
        - disabled
        - archived
      title: FeatureFlagStatus
      type: string
    FirstTimeEventDuration:
      enum:
        - end_of_session
        - indefinitely
      title: FirstTimeEventDuration
      type: string
    RuntimeEventTimeWindow:
      enum:
        - while_flag_enabled
      title: RuntimeEventTimeWindow
      type: string
    ServingMethod:
      enum:
        - client
        - server
        - remote_or_local
        - remote_only
      title: ServingMethod
      type: string
    FeatureFlagContractStatus:
      description: Status of a project's feature flags contract.
      enum:
        - active
        - grace_period
        - expired
      title: FeatureFlagContractStatus
      type: string

    # --- Management sub-schemas (collision-safe names) ---
    ManagementVariant:
      additionalProperties: false
      properties:
        key:
          title: ''
          type: string
        value:
          anyOf:
            - type: boolean
            - maxLength: 32768
              type: string
            - {}
          title: ''
        description:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: ''
        is_control:
          title: ''
          type: boolean
        split:
          maximum: 1.0
          minimum: 0.0
          title: ''
          type: number
        is_sticky:
          default: false
          title: ''
          type: boolean
      required:
        - key
        - value
        - is_control
        - split
      title: ManagementVariant
      type: object

    ManagementVariantOverride:
      additionalProperties: false
      description: A pointer to the variant defined under ruleset.variants[<key>]
      properties:
        key:
          title: ''
          type: string
      required:
        - key
      title: ManagementVariantOverride
      type: object

    RuntimeEventRule:
      additionalProperties: false
      description: Configuration for first-time event targeting in rollout groups.
      properties:
        event_name:
          title: ''
          type: string
        time_window:
          $ref: '#/components/schemas/RuntimeEventTimeWindow'
        duration:
          anyOf:
            - $ref: '#/components/schemas/FirstTimeEventDuration'
            - type: 'null'
          default: null
          title: ''
        property_filters:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: ''
      required:
        - event_name
        - time_window
      title: RuntimeEventRule
      type: object

    ManagementRollout:
      additionalProperties: false
      properties:
        name:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: ''
        cohort_definition:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: ''
        runtime_evaluation_definition:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: ''
        runtime_evaluation_rule:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: ''
        runtime_event_rule:
          anyOf:
            - $ref: '#/components/schemas/RuntimeEventRule'
            - type: 'null'
          default: null
          title: ''
        cohort_hash:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: ''
        rollout_percentage:
          maximum: 1.0
          minimum: 0.0
          title: ''
          type: number
        variant_override:
          anyOf:
            - $ref: '#/components/schemas/ManagementVariantOverride'
            - type: 'null'
          default: null
          title: ''
        variant_splits:
          additionalProperties:
            type: number
          title: ''
          type: object
      required:
        - rollout_percentage
        - variant_splits
      title: ManagementRollout
      type: object

    ManagementRuleSet:
      additionalProperties: false
      properties:
        variants:
          items:
            $ref: '#/components/schemas/ManagementVariant'
          maxItems: 11
          title: ''
          type: array
        rollout:
          items:
            $ref: '#/components/schemas/ManagementRollout'
          title: ''
          type: array
        test:
          anyOf:
            - additionalProperties:
                additionalProperties:
                  type: string
                type: object
